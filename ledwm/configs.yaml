  rssm: { add_h_to_query: True }

sum_reward:
  replay:
    imbalance_reward: "sum"

s3_bigger_reward:
  reward_head: { bound: 2, bins: 200 }
  critic: { bound: 2, bins: 200 }

high_entropy:
  actor_entropy: 6e-3

norm_adv:
  norm_adv: True
  advnorm: { impl: off, decay: 0.99, max: 1.0, perclo: 5.0, perchi: 95.0 } # take from DreamerSmooth

finetune_policy:
  finetune_script: "run_finetune" # runfinetune, find_trial_number, measure_return
  skip_from_wm: False
  skip_win: False
  num_eval_eps: 10
  jax: { prealloc: False }
  multi_step: False
  load_match_shape: True
  batch_length: 1
  batch_size: 1
  envs:
    amount: 10
    parallel: none
  run:
    script: "finetune_policy"
    eps_finetune: 1000
    step_finetune: 5000
  # set mode in messenger = test
  env:
    messenger: { mode: "test" }
    lwm: { mode: "test" }
  replay: { size: 1000 }
  actor_opt: { lr: 1e-5 }
  critic_opt: { lr: 1e-4 }
  model_opt: { frozen_keys: ".*" }
  actor: { unimix: 0.1 }
  imag_cont_hard: True
  # finetune_log_every: 50
  log_every: 60
  real_step_log: False

finetune_policy_seen_traj:
  finetune_script: "run_finetune" # runfinetune, find_trial_number, measure_return
  env:
    messenger: { mode: "test-se" } # or test
    lwm: { mode: "test" }
  imag_cont_hard: True
  actor_opt: { lr: 5e-6, clip: 100 }
  critic_opt: { lr: 5e-4 }
  model_opt: { frozen_keys: ".*" }

measure_return:
  finetune_script: "measure_return" # runfinetune, find_trial_number, measure_return
  num_eval_eps: 10
  jax: { prealloc: False }
  multi_step: False
  load_match_shape: True
  batch_length: 1
  batch_size: 1
  envs:
    amount: 10
    parallel: none
  run:
    script: "finetune_policy"
    eps_finetune: 1000
    step_finetune: 5000
  # set mode in messenger = test
  env:
    messenger: { mode: "test-se" }
    lwm: { mode: "test" }
  replay: { size: 1000 }
  imag_cont_hard: True
  # finetune_log_every: 50
  log_every: 60
  real_step_log: False
  measure_policy: greedy #
  load_multiple_ckpts: True
  # report_return_lambda:
  actor: { unimix: 0 }

finetune_decay:
  actor:
    unimix_decay: { init: 1, steps: 5000, final: 0 }
  run:
    opt_step: True
  jax:
    opt_step: True

frozen_wm:
  model_opt:
    frozen_keys: ".*"

multi_head_atten:
  rssm:
    atten:
      heads: 2
      query_dim: 32
      key_dim: 32
      value_dim: 32
      mlp_query_key: False
    cnn_atten:
      # preconv: True
      depths: [64, 64, 128, 256] # first is input

