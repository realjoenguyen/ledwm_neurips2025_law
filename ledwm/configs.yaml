defaults:
  # load_multiple_ckpts: False
  # clip_grad_atten: 0.0
  # dyn_first_more: False
  # pos_head_seperate: True
  seperate_object_z: False
  concat_role_movement: True
  offline_one_config: False
  train_offline_on: "train"
  deter_limit: False
  use_role: False
  movement_role_lang_grid: False
  slow_encoder_fraction: 0.0
  slow_encoder: False
  slow_encoder_update: 1
  ema_encoder: False
  overfit_batch_steps: 30000
  time_in: 'obs'
  dyn_rep_anneal: False
  overfit_batch: False
  rollout_image: False
  loss_up_is_first_weight: 0.0
  one_step_image: False
  oracle_data_split: "all"  # ['all', 'train', 'test']
  oracle_data_mode: 'hard'  # easy, medium, hard
  dyn_rep_up_weight: 0.0
  dyn_rep_up_nonzero: 0.0
  skip_first_layer: False
  residual_decoder: False
  use_unimix_decay: False
  kl_anneal: False
  rep_anneal: False
  slow_atten: False
  residual_z: False
  increase_rep: { enable: False }
  predefined_concepts: False
  num_concepts: 0
  concept_dim: 0
  posMLP: True
  resume_replay: False
  imag_improve_thres: 0.02
  imag_improve_max: 1.3
  z_argmax_imagine: False
  z_argmax_train: False
  report_return_lambda: 1.0
  use_movement_class: False
  measure_policy: greedy
  actor_random_unimix: False
  uncertainty_scale: 0
  min_reward: -1
  finetune_script: "run_finetune"
  skip_from_wm: False
  skip_win: False
  lose_only: False
  train_policy_is_first: False
  train_policy_only: False
  zero_pos: False
  duplicate_pos_eps: False
  decay_multi_step: False
  num_eval_eps: 5
  input_z_sc: False
  dim_x: 1024
  use_prev_stoch: False
  test_set: "test"
  deter_decoder: True
  norm_adv: False
  # sg_ac: False
  sg_ac: True
  batch_norm_rep: False
  entity_track_and: False
  entity_track: "none"
  ignore_error: False
  action_pred: True
  value_pred: False
  slow_value_target: False
  drop_x_randomly_in_query: False
  pos_only: False
  num_eval_envs: 8

  replay:
    max_bw: 10
    is_first: True
    type: prioritize
    prioritize_hyper:
      eps: 0.001
      alpha: 2
      beta: 0.5
      c: 1e5
      branching: 16
      initial: 300
      exponent: 1
    online: False
    resume: False
    prefill: "" # empty disables; "auto" loads newest compatible sibling run
    size: 1e4 # replace replay_size
    min_size: 0 # 0 means use batch_size before sampling
    tolerance_rate: 5
    remove_oversample: False
    seperate_reward_stream: True
    # upsample_pos: False
    upsample_pos_rate: 0.5
    # balanced_weight: False
    imbalance: "balanced_weight"
    balanced_weight_ac: False
    imbalance_reward: "sum"
    balanced_weight_priority: False
    bw_scale: "sqrt"

  has_image_input: True
  encode_image: True
  multi_step: False
  dyn_rep_multi_step: False
  # dyn_multi_step: False
  # entity_aug: False

  load_match_shape: False # load whatever matches shape
  no_concat_image: [""]
  real_step_log: True
  # real_step_log: False
  rew_smooth_amt: 0.0
  rew_smooth_mode: "none"
  rep_first: False
  # is_first_replay: True
  rep_first_min: 0
  kl_weight: "none"
  overfit: False
  data: token
  use_read: True
  use_time: False
  use_wandb: True
  use_table: False
  small_image: False
  small_image_data: False
  small_image_decoder: False
  table_keys: [
      # "image_loss",
      # "image_gt",
      # "image_gt_multihot",
      # "image_pred",
      # "image_diff",
      # "image_openl",
      # "entity_pos",
      # "avatar_pos",
      "atten",
      # "atten1",
      # "atten2",
    ]
  table_names: ["eval/report/", "train/"]
  sync_tfboard: True
  # encoder_size: xlarge
  # decoder_size: xlarge
  size: xlarge
  vis:
    recont: False

  # Trainer
  seed: 1000
  method: name
  task: dummy_disc
  logdir: ""
  logdir_base: "./logdir"
  loaddirs: [""]
  # load_wm_only: False
  # load_policy_ckpt: False
  load_only_key: ""
  load_exclude_key: ""
  # dataset_exclude_keys: ["info", "language_info"]
  dataset_exclude_keys: ["info"]
  eval_dir: ""
  filter: (loss|fps|score|precision|recall|value)
  text_dataset: ""

  jax:
    opt_step: False
    cuda_data_dir: None
    platform: gpu
    jit: True
    precision: bfloat16
    prealloc: False
    mem_fraction: 0.8
    allocator: platform
    xla_autotune_level: 4
    quiet_xla: False
    debug_nans: False
    logical_cpus: 0
    debug: False
    policy_devices: [0]
    train_devices: [0]
    sync_every: 10
    profiler: False
    transfer_guard: False
    # transfer_guard: True

  run:
    resume_replay_from: ""
    finetune_train_ratio_after_load: 256
    num_eps_each_policy: 10000
    max_reconnect: 20
    actor_timeout: 30
    eps_finetune: 1000
    use_table: False
    debug: False
    opt_step: False
    report: { train: True, first_bs: 24, first_bl: 65 }
    first_step: False
    overfit_eps: False
    skip_key: ""
    resume_last: False
    resume: ""
    train_steps: 100
    reset_logger: False
    server: None
    parallel_eval: false
    mixed_precision: false
    # env_step_timer: False
    save_frames_to: ./frames/
    script: parallel_train_eval_test
    steps: 1e7
    expl_until: 0
    log_every: 300  # 5 minutes
    learner_log_every: 60  # 1 minute; terminal progress only
    log_video_every: 600
    # log_timer: 0
    log_env_step: { every: 0, chunk: True }
    save_every: 900
    eval_every: 1e4
    eval_initial: True
    eval_eps: 1000
    eval_samples: 1
    train_ratio: 64
    train_fill: 0
    eval_fill: 0
    pretrain: 1
    pretrain_wm_only: False
    log_zeros: False
    log_video: False
    log_keys_video: [log_image]
    log_keys_sum: "^$"
    log_keys_mean: "(log_entropy)"
    log_keys_max: "^$"
    episode_log_every: 0
    log_video_streams: 20
    log_video_timeout: 60
    from_checkpoint: ""
    load_checkpoint: True
    sync_every: 10
    actor_host: "localhost"
    actor_port: "5551"
    actor_batch: 0 # 0 = auto (use envs.amount); set >0 to decouple from env count
    actor_threads: 4
    actor_timing: False
    actor_timing_every: 30
    env_timing: False
    env_timing_every: 30
    compact_action_rpc: True
    keep_policy_state_on_device: True
    async_replay_add: True
    async_replay_add_queue: 4096
    async_actor_postprocess: True
    async_actor_postprocess_queue: 2
    compile_only: False
    # Training-graph diagnostics are useful for profiling but expensive at
    # large batches. Individual task presets can enable the lean path.
    fast_train_metrics: False
    fast_optimizer_metrics: False
    skip_adam_metrics: False
    skip_train_outs: False
    env_replica: -1
    ipv6: False
    trace_malloc: False

  envs:
    {
      amount: 0,
      parallel: process,
      length: 0,
      reset: True,
      restart: True,
      discretize: 0,
    }
  wrapper:
    {
      length: 0,
      reset: True,
      discretize: 0,
      checks: False,
      timeout_reward: 0.0,
    }
  env:
    atari:
      {
        size: [64, 64],
        repeat: 4,
        sticky: True,
        gray: True,
        actions: all,
        lives: unused,
        noops: 0,
        pooling: 2,
        aggregate: max,
        resize: pillow,
      }
    atari100k:
      {
        size: [64, 64],
        repeat: 4,
        sticky: False,
        gray: False,
        lives: unused,
        noops: 30,
        resize: pillow,
      }
    dmlab: { size: [64, 64], repeat: 4, episodic: True }
    minecraft: { size: [64, 64], break_speed: 100.0, logs: False }
    dmc: { size: [64, 64], repeat: 2, camera: -1 }
    loconav: { size: [64, 64], repeat: 2, camera: -1 }
    vln:
      size: [64, 64]
      mode: "train"
      use_text: True
      use_depth: True
      dataset: train
      use_expert: 0.
      min_use_expert: 0.
      anneal_expert_eps: 0
      success_reward: 1000
      early_stop_penalty: 0
      use_descriptions: False
      desc_length: 50

    messenger:
      size: [16, 16]
      length: 1
      vis: False
      mode: "train"
      use_sent_ids: True
      model_sent: "mini"
      debug_pos_gt: False
      deter_game: False
      mask_future_steps_dp: True # future steps = -1

    lwm:
      disappear: True
      overfit_game: False
      size: [16, 16]
      length: 1
      vis: False
      mode: "train"
      # load_embeddings: True
      use_sent_ids: True
      model_sent: "mini"
      debug_pos_gt: False
      # use_time_step: False
      mask_future_steps_dp: True # future steps = -1

    homegrid:
      size: [64, 64]
      # env config
      max_steps: 100
      num_trashobjs: 2
      num_trashcans: 2
      p_teleport: 0.05
      p_unsafe: 0.
    langroom:
      length: 200
      vocab_size: 15

  # Agent
  task_behavior: Greedy
  expl_behavior: None
  batch_size: 16
  batch_length: 30
  data_workers: 8 # num_workers

  # World Model
  grad_heads: [decoder, reward, cont, multi_reward, multi_cont, value]
  rssm_type: rssm
  atten_vec: False
  rssm: {
      gru_multi_layers: False,
      pos_dim: 32,
      seperate_cnn_image: False,
      no_history_rollout: False,
      lang_image_recon: False,
      soft_z: { use: False },
      impl: softmax,
      deter: 4096,
      units: 1024,
      stoch: 32,
      classes: 32,
      act: silu,
      norm: layer,
      unimix: 0.01,
      unroll: False,
      action_clip: 1.0,
      # bottleneck: -1,
      winit: normal,
      fan: avg,
      maskgit: { embed: 256, layers: 4, heads: 4, ffwdim: 256, steps: 4 },
      add_h_to_query: False, # include deter to query input for the atten
      task: "none",
      dropout: 0.0,
      entity_track_atten: False,
    }
  # early_rssm:
  #   {
  #     deter: 4096,
  #     units: 1024,
  #     stoch: 32,
  #     classes: 32,
  #     act: silu,
  #     norm: layer,
  #     unimix: 0.01,
  #     unroll: False,
  #     action_clip: 1.0,
  #     bottleneck: -1,
  #     winit: normal,
  #     fan: avg,
  #     prior_layers: 3,
  #   }
  # token_rssm:
  #   {
  #     deter: 4096,
  #     units: 1024,
  #     stoch: 32,
  #     classes: 32,
  #     vocab: 32100,
  #     act: silu,
  #     norm: layer,
  #     unimix: 0.01,
  #     unroll: False,
  #     action_clip: 1.0,
  #     bottleneck: -1,
  #     winit: normal,
  #     fan: avg,
  #     prior_layers: 3,
  #   }
  encoder_type: token
  decoder_type: none
  encoder: {
      sent: false,
      mlp_keys: "token_embed",
      cnn_keys: ".*",
      act: silu,
      norm: layer,
      mlp_layers: 5,
      # mlp_units: 1024,
      mlp_units: 512,
      cnn: resnet,
      depths: [17, 34, 64],
      kernels: [3, 3],
      stages: 2,
      minres: 3,
      # cnn_depth: 96,
      blocks: 0,
      resize: stride,
      winit: normal,
      fan: avg,
    }

  decoder: {
      mlp_keys: "",
      cnn_keys: ".*",
      act: silu,
      norm: layer,
      mlp_layers: 5,
      mlp_units: 1024,
      cnn: resnet,
      # cnn_depth: 96,
      depths: [64, 32, 17],
      stages: 2,
      kernels: [3, 3],
      minres: 3,
      blocks: 0,
      image_dist: binary,
      vector_dist: symlog_mse,
      inputs: [deter, stoch],
      resize: stride,
      winit: normal,
      fan: avg,
      outscale: 1.0,
      cnn_sigmoid: False,
    }

  decoder_sent:
    mlp_keys: ""

  reward_head: {
      layers: 3,
      units: 1024,
      act: silu,
      norm: layer,
      dist: symlog_and_twohot,
      outscale: 0.0,
      outnorm: False,
      inputs: [deter, stoch],
      dims: deter,
      winit: normal,
      fan: avg,
      bins: 255,
      dropout: 0.0,
      dropout_inputs: [deter]
    }
  cont_head: {
      layers: 3,
      units: 1024,
      act: silu,
      norm: layer,
      dist: binary,
      outscale: 1.0,
      outnorm: False,
      inputs: [deter, stoch],
      dims: deter,
      winit: normal,
      fan: avg,
      dropout: 0.0,
      dropout_inputs: [deter]
    }
  action_head: {
      layers: 3,
      units: 1024,
      act: silu,
      norm: layer,
      minstd: 0.1,
      maxstd: 1.0,
      outscale: 1.0,
      outnorm: False,
      inputs: [prev_stoch, x],
      dims: x, # output has dims = dims(x) = bs, bl, 512
      winit: normal,
      fan: avg,
      symlog_inputs: False,
      dropout: 0.0,
      dist: onehot,
    }
  loss_scales: {
      image: 0,
      rollout_image: 0.0,
      next_image: 0.0,
      lang_image: 0.0,
      rollout_lang_image: 0.0,
      vector: 0, # reconstruct token symlog_mse
      reward: 1.0,
      rollout_reward: 1.0,
      cont: 1.0,
      rollout_cont: 1.0,
      rollout_dyn: 0.0,
      rollout_rep: 0.0,
      dyn: 1.0,
      rep: 0.1,
      actor: 1.0,
      action: 1.0,
      critic: 1.0,
      slowreg: 1.0,
      token: 1.0,
      lm: 0.0,
      kl: 0,
      num_pixels: 0.5,
      prev_action: 1.0,
      value: 1.0,
    }
  rssm_loss:
    {
      dyn_free: 1.0,
      rep_free: 1.0,
      rollout_dyn_free: 1.0,
      rollout_rep_free: 1.0,
      free_rep_only: False,
    }
  model_opt: {
      frozen_keys: "enc_sent/sent_embed",
      opt: adam,
      lr: 3e-4, # 0.001
      eps: 1e-8,
      clip: 30,
      wd: 0.0,
      warmup: 0,
      lateclip: 0.0,
      clip_grad_atten: 0.0,
      # frozen_keys: "^$",1000@06-25#11-50-22#73e
    }
  skip_cnn_training: False
  skip_mlp_training: False
  zero_data_keys: [""]
  zero_cnn: False
  zero_mlp: False

  # Actor Critic
  actor: {
      layers: 3,
      units: 1024,
      act: silu,
      norm: layer,
      minstd: 0.1,
      maxstd: 1.0,
      outscale: 1.0,
      outnorm: False,
      unimix: 0.1,
      # unimix_decay: {},
      # unimix_decay: { init: 0.5, steps: 6e4, final: 0.2 },
      inputs: [deter, stoch],
      winit: normal,
      fan: avg,
      symlog_inputs: False,
    }
  critic:
    {
      layers: 3,
      units: 1024,
      act: silu,
      norm: layer,
      dist: symexp_twohot,
      outscale: 0.0,
      outnorm: False,
      inputs: [deter, stoch],
      winit: normal,
      fan: avg,
      bins: 255,
      symlog_inputs: False,
    }
  actor_opt:
    {
      opt: adam,
      lr: 2e-4,
      eps: 1e-5,
      clip: 100.0,
      wd: 0.0,
      warmup: 0,
      lateclip: 0.0,
    }
  critic_opt:
    {
      opt: adam,
      lr: 1e-4,
      eps: 1e-5,
      clip: 100.0,
      wd: 0.0,
      warmup: 0,
      lateclip: 0.0,
    }
  actor_dist_disc: onehot
  actor_dist_cont: normal
  actor_grad_disc: reinforce
  actor_grad_cont: backprop
  critic_type: vfunction
  imag_horizon: 4
  imag_unroll: False
  # imag_cont: mean
  imag_cont_hard: True
  imag_cont: mode
  horizon: 333
  return_lambda: 0.95
  critic_slowreg: logprob
  slow_critic_update: 1
  slow_critic_fraction: 0.02
  slow_critic_target: False
  retnorm: { impl: perc_ema, decay: 0.99, max: 1.0, perclo: 5.0, perchi: 95.0 }
  actor_entropy: 3e-4 # entropy reg

  # Exploration
  expl_rewards: { extr: 1.0, disag: 0.1 }
  expl_opt: { opt: adam, lr: 1e-4, eps: 1e-5, clip: 100.0, wd: 0.0, warmup: 0 }
  disag_head:
    {
      layers: 5,
      units: 1024,
      act: silu,
      norm: layer,
      dist: mse,
      outscale: 1.0,
      inputs: [deter, stoch, action],
      winit: normal,
      fan: avg,
    }
  disag_target: [stoch]
  disag_models: 8

  # Director
  director_jointly: True
  train_skill_duration: 8
  env_skill_duration: 8
  goal_enc:
    {
      layers: 5,
      units: 1024,
      act: silu,
      norm: layer,
      dist: onehot,
      outscale: 1.0,
      inputs: [goal],
    }
  goal_dec:
    {
      layers: 5,
      units: 1024,
      act: silu,
      norm: layer,
      dist: mse,
      outscale: 0.1,
      inputs: [skill],
    }
  goal_opt:
    {
      opt: adam,
      lr: 1e-4,
      eps: 1e-6,
      clip: 100.0,
      wd: 1e-2,
      wd_pattern: "kernel",
    }
  goal_kl_scale: 1.0
  goal_kl_free: 1.0
  skill_shape: [8, 8]
  manager_rews: { extr: 1.0, expl: 0.1, goal: 0.0 }
  worker_rews: { extr: 0.0, expl: 0.0, goal: 1.0 }
  worker_inputs: [deter, stoch, goal]
  worker_goals: [manager]
  worker_report_horizon: 64

