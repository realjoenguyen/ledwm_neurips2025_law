  env:
    messenger:
      entity_track: True
  encoder_sent:
    entity_track: True
  entity_track_and: True
  table_keys: ["atten", "atten1", "atten2"]

ignore_error:
  ignore_error: True

action_pred:
  action_pred: True
  action_head:
    {
      layers: 3,
      units: 1024,
      act: silu,
      norm: layer,
      minstd: 0.1,
      maxstd: 1.0,
      outscale: 1.0,
      outnorm: False,
      inputs: [prev_stoch, x],
      dims: x, # output has dims = dims(x) = bs, bl, 512
      winit: normal,
      fan: avg,
      symlog_inputs: False,
      dropout: 0.0,
      dist: onehot,
    }
  loss_scales:
    action: 1.0

value_pred:
  value_pred: True
  slow_value_target: False
  slow_value_fraction: 0.02
  slow_value_update: 1
  value_slowreg: logprob
  value_head:
    {
      layers: 3,
      units: 1024,
      act: silu,
      norm: layer,
      dist: symexp_twohot,
      outscale: 0.0,
      outnorm: False,
      inputs: [deter, stoch],
      winit: normal,
      fan: avg,
      bins: 20,
      bound: 1,
      symlog_inputs: False,
    }
  loss_scales:
    value: 1

drop_x_randomly_in_query:
  drop_x_randomly_in_query: True

no_decoder: # no reconstruct sentence vec and image
  decoder_type: none
  loss_scales:
    vector: 0
    image: 0
  decoder_sent:
    mlp_keys: ""

