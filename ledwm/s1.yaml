s1_token:
  batch_length: 512
  run:
    script: parallel
  task: "messenger_s1"
  # rew_smooth_amt: 0.5
  env: { messenger: { length: 4 } }
  reward_head: { bound: 1, bins: 20 }
  critic: { bound: 1, bins: 20 }
  encoder:
    kernels: [2, 2]
  decoder:
    kernels: [2, 2]
  rssm:
    deter: 2048
    # classes: 32
    # cnn_atten:
    #   depths: [32, 48, 128] # first is input
    #   dropout: 0.1
  imag_horizon: 4

s1:
  # z_argmax_train: True
  # z_argmax_imagine: True
  # unimix actor
  actor: { unimix: 0.1 }
  task: "messenger_s1"
  env: { messenger: { length: 4 } }
  reward_head:
    bound: 1
    bins: 20
  critic: { bound: 1, bins: 20 }
  rssm:
    task: "s1"
    deter: 256
    classes: 16
    atten: { query_dim: 64, key_dim: 64, value_dim: 32 }
    # cnn_atten:
    #   depths: [32, 48, 128] # first is input
  imag_horizon: 4

s1_train:
  _include:
    - sent
    - large_encoder_s
    - large_decoder_s
    - small_image_data
    - time
    - two_cnn
    - multi_step
    - no_image_input
    - sum_reward
    - prioritize
    - no_decoder
    - balanced_weight
    - medium
    - reward_onehot
    - deter_z
    - s1
  batch_length: 25
  data_workers: 8
  use_wandb: False
  num_eval_envs: 30
  envs: { amount: 500 }
  replay: { size: 10000, min_size: 64, prefill: auto }
  jax:
    allocator: ""
    prealloc: True
    mem_fraction: 0.9
    precision: bfloat16
  run:
    train_ratio: 512
    actor_batch: 64
    actor_threads: 8
    keep_policy_state_on_device: False
    fast_train_metrics: True
    fast_optimizer_metrics: True
    skip_adam_metrics: True
    skip_train_outs: True
  test_set: test
  env: { messenger: { length: 4 } }
  imag_horizon: 4
  rssm: { deter: 256, add_h_to_query: False }
  load_exclude_key: sent_embed

s1_finetune_eval:
  batch_length: 150
  replay: { size: 2e4 }
  run:
    train_ratio: 64
    step_finetune: 500
    eps_finetune: 2000
  test_set: test
  env:
    messenger:
      length: 4
      mode: test
  imag_horizon: 4
  rssm: { deter: 256 }
  num_eval_eps: 100
  envs: { amount: 100 }
  jax: { prealloc: False }
  imag_improve_thres: 0.02
  skip_from_wm: True
